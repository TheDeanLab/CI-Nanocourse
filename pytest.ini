[pytest]
addopts =
    -ra
    --strict-markers

# Optional coverage flags (requires pytest-cov):
# --cov
# --cov-report=term-missing
# --cov-report=xml
# --cov-report=html

markers =
    unit: fast tests for isolated behavior
    integration: tests that rely on external systems or services
    e2e: end-to-end tests across multiple components
    hardware: tests requiring physical hardware

testpaths =
    tests
    test

log_cli = true
